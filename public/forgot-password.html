<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your password - Exam Slot Booking System">
    <title>Forgot Password - Exam Slot Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============================================
     FORGOT PASSWORD PAGE
     3-step flow: Email → OTP → New Password
     ============================================ -->
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="icon">🔑</div>
            <h2>Reset Password</h2>
            <p>We'll send an OTP to your email</p>
        </div>

        <!-- Alert Message -->
        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Enter Email -->
        <form id="emailForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="sendOtpBtn">
                Send OTP
            </button>
        </form>

        <!-- Step 2: Enter OTP -->
        <div id="otpSection" style="display:none;">
            <div style="background: #dbeafe; border: 1px solid #bfdbfe; border-radius: 6px; padding: 0.8rem 1rem; margin-bottom: 1rem; text-align: center;">
                <p style="color: #1e40af; font-size: 0.88rem; margin: 0;">
                    📧 Reset OTP sent to <strong id="maskedEmail"></strong>
                </p>
                <p style="color: #3b82f6; font-size: 0.78rem; margin: 0.3rem 0 0;">
                    Check your inbox (and spam folder)
                </p>
            </div>
            <form id="otpForm">
                <div class="form-group">
                    <label for="otpInput">Enter OTP</label>
                    <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>
                <button type="submit" class="btn btn-success btn-block" id="verifyOtpBtn">
                    Verify OTP
                </button>
            </form>
            <div style="text-align: center; margin-top: 0.75rem;">
                <button type="button" class="btn-resend" id="resendBtn" onclick="resendOTP()" disabled>
                    Resend OTP (<span id="resendTimer">30</span>s)
                </button>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="passwordSection" style="display:none;">
            <div style="background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 6px; padding: 0.8rem 1rem; margin-bottom: 1rem; text-align: center;">
                <p style="color: #166534; font-size: 0.88rem; margin: 0;">
                    ✅ OTP verified! Set your new password below.
                </p>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    Reset Password
                </button>
            </form>
        </div>

        <div class="auth-footer">
            <a href="index.html">← Back to Login</a>
        </div>
    </div>
</div>

<script src="js/forgot-password.js"></script>
</body>
</html>
