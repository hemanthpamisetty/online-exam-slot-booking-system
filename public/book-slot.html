<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book an exam slot - View available slots and book your exam">
    <title>Book Slot - Exam Slot Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============================================
     NAVIGATION BAR
     ============================================ -->
<nav class="navbar">
    <div class="logo">🎓 <span>ExamSlot</span> Booking</div>
    <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="book-slot.html" class="active">Book Slot</a></li>
        <li><a href="#" class="btn-logout" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<!-- ============================================
     MAIN CONTENT
     ============================================ -->
<div class="container">
    <div class="page-header">
        <h1>📅 Available Exam Slots</h1>
        <p>Browse and book your preferred exam slot</p>
    </div>

    <!-- Alert -->
    <div id="alertBox" class="alert"></div>

    <!-- Slots Grid -->
    <div class="slots-grid" id="slotsContainer">
        <!-- Slots loaded via JS -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">📅</div>
        <h3>No slots available</h3>
        <p>There are no exam slots available at the moment. Please check back later.</p>
    </div>
</div>

<script src="js/slots.js"></script>
</body>
</html>
