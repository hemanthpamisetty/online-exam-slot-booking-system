<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hall Ticket - View and print your exam hall ticket">
    <title>Hall Ticket - Exam Slot Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============================================
     NAVIGATION BAR
     ============================================ -->
<nav class="navbar">
    <div class="logo">🎓 <span>ExamSlot</span> Booking</div>
    <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="book-slot.html">Book Slot</a></li>
        <li><a href="#" class="btn-logout" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<!-- ============================================
     MAIN CONTENT
     ============================================ -->
<div class="container">
    <div class="page-header">
        <h1>🎫 Hall Ticket</h1>
        <p>Your exam admission ticket</p>
    </div>

    <!-- Alert -->
    <div id="alertBox" class="alert"></div>

    <!-- Hall Ticket -->
    <div class="hall-ticket" id="hallTicket" style="display:none;">
        <div class="ticket-header">
            <h2>EXAM HALL TICKET</h2>
            <p>Online Exam Slot Booking System</p>
        </div>

        <div class="ticket-body">
            <div class="ticket-number">
                <h3>HALL TICKET NUMBER</h3>
                <div class="number" id="ticketNo"></div>
            </div>

            <div class="ticket-row">
                <div class="ticket-field">
                    <label>Student Name</label>
                    <p id="ticketName"></p>
                </div>
                <div class="ticket-field">
                    <label>Register Number</label>
                    <p id="ticketRegNo"></p>
                </div>
            </div>

            <div class="ticket-row">
                <div class="ticket-field">
                    <label>Email</label>
                    <p id="ticketEmail"></p>
                </div>
                <div class="ticket-field">
                    <label>Phone</label>
                    <p id="ticketPhone"></p>
                </div>
            </div>

            <div class="ticket-row">
                <div class="ticket-field">
                    <label>Exam Name</label>
                    <p id="ticketExam"></p>
                </div>
                <div class="ticket-field">
                    <label>Venue</label>
                    <p id="ticketVenue2"></p>
                </div>
            </div>

            <div class="ticket-row">
                <div class="ticket-field">
                    <label>Exam Date</label>
                    <p id="ticketDate"></p>
                </div>
                <div class="ticket-field">
                    <label>Time</label>
                    <p id="ticketTime"></p>
                </div>
            </div>

            <div class="ticket-row">
                <div class="ticket-field">
                    <label>Venue</label>
                    <p id="ticketVenue"></p>
                </div>
                <div class="ticket-field">
                    <label>Status</label>
                    <p id="ticketStatus"></p>
                </div>
            </div>
        </div>

        <div class="ticket-footer">
            <p>⚠️ Please carry this hall ticket along with a valid photo ID to the exam center.</p>
        </div>
    </div>

    <!-- Print Button -->
    <div style="text-align: center; margin-top: 1.5rem;" id="printSection" class="btn-print">
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print Hall Ticket</button>
        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'" style="margin-left: 0.5rem;">← Back to Dashboard</button>
    </div>
</div>

<script src="js/navbar.js"></script>
<script src="js/hallticket.js"></script>
</body>
</html>
